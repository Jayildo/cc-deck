<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Anti-flash: stamp the persisted theme onto <html> before first paint,
      // so a returning user on a non-default theme doesn't see a flash of
      // Midnight (the :root fallback) before main.ts takes over.
      (function () {
        try {
          var t = localStorage.getItem("cc-deck-theme");
          var valid = ["midnight", "nord", "solarized-dark", "gruvbox", "solarized-light"];
          document.documentElement.setAttribute("data-theme", valid.indexOf(t) !== -1 ? t : "midnight");
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%9B%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <title>cc-deck</title>
  </head>
  <body>
    <div id="app">
      <!-- Top bar: account usage ──────────────────────────────────────────── -->
      <header id="usage-bar">
        <div id="usage-windows">
          <div class="usage-win">
            <span class="win-label">5h</span>
            <div class="bar-track"><div class="bar-fill green" id="bar5h"></div></div>
            <span class="win-pct" id="pct5h">—</span>
          </div>
          <div class="usage-win">
            <span class="win-label">7d</span>
            <div class="bar-track"><div class="bar-fill green" id="bar7d"></div></div>
            <span class="win-pct" id="pct7d">—</span>
          </div>
          <span id="reset-countdown"></span>
          <span id="plan-badge"></span>
          <span id="source-badge" class="badge badge-gray">—</span>
        </div>
        <div id="theme-switcher" role="group" aria-label="Theme"></div>
        <button id="report-btn" title="일일 업무일지">📋</button>
        <button id="refresh-btn" title="Refresh usage">↻</button>
      </header>

      <!-- Body ────────────────────────────────────────────────────────────── -->
      <div id="layout">
        <!-- Sidebar: session list ─────────────────────────────────────────── -->
        <aside id="sidebar">
          <button id="new-session-btn">+ New Session</button>
          <div id="new-session-form" class="hidden">
            <input id="cwd-input" type="text" placeholder="e.g. C:/project/my-app" spellcheck="false" />
            <div class="form-actions">
              <button id="open-session-btn">Open</button>
              <button id="cancel-session-btn">Cancel</button>
            </div>
            <div id="project-picker"></div>
          </div>
          <div id="session-list"></div>
        </aside>

        <!-- Main: terminal + metrics strip ───────────────────────────────── -->
        <main id="main">
          <div id="terminal-container">
            <div id="terminal-wrap"></div>
            <div id="empty-state">Select or open a session to begin</div>
          </div>
          <div id="metrics-strip" class="hidden">
            <span id="m-model">—</span>
            <span class="sep">·</span>
            <span id="m-context">ctx —</span>
            <span class="sep">·</span>
            <span id="m-tokens">—</span>
            <span class="sep">·</span>
            <span id="m-progress">—</span>
            <span class="sep">·</span>
            <span id="m-turns">— turns</span>
          </div>
        </main>
      </div>
    </div>

    <!-- Daily report modal ──────────────────────────────────────────────── -->
    <div id="report-modal" class="hidden">
      <div class="report-panel">
        <div class="report-head">
          <strong>📋 일일 업무일지</strong>
          <button id="report-gen-btn">오늘 생성</button>
          <span id="report-status"></span>
          <button id="report-close" class="report-x" title="닫기">×</button>
        </div>
        <div class="report-body">
          <div id="report-dates"></div>
          <pre id="report-content">날짜를 선택하거나 '오늘 생성'을 누르세요.</pre>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
